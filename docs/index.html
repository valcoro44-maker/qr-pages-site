<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Landing Page</title>
    <style>
      :root {
        --page-bg: #f5f1e8;
        --card-bg: #fffdf8;
        --text: #1f1b16;
        --muted: #5c5147;
        --accent: #a33b20;
        --border: #dccfbe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top right, rgba(163, 59, 32, 0.08), transparent 30%),
          linear-gradient(180deg, #f8f4ec 0%, var(--page-bg) 100%);
        color: var(--text);
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 16px 40px rgba(31, 27, 22, 0.08);
      }

      .banner {
        display: block;
        width: min(100%, 520px);
        margin: 0 auto 24px;
        height: auto;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: clamp(2rem, 6vw, 3rem);
        line-height: 1.05;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.7;
        color: var(--muted);
      }

      .home-link {
        display: inline-block;
        margin-top: 12px;
        color: var(--accent);
        text-decoration: none;
        font-weight: bold;
      }

      .nav-block {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }

      .page-list {
        margin: 0;
        padding-left: 20px;
      }

      .page-list a {
        color: var(--accent);
      }

      .video-block {
        margin-top: 32px;
      }

      .video-block h2 {
        margin-bottom: 12px;
      }

      .video-frame {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        overflow: hidden;
        border-radius: 16px;
        background: #000;
      }

      .video-frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <article class="card">

        <img
          class="banner"
          src="./assets/roseman-mountain-logo.png"
          alt="Roseman University of Health Sciences"
        >
        <h1>Welcome</h1>
        <p>This is a starter page built with Python and published as static HTML on GitHub Pages.</p>
        <p>You can put this URL into a QR code so people can scan and open it on their phones.</p>

      <section class="nav-block" aria-labelledby="pages-title">
        <h2 id="pages-title">Pages</h2>
        <ul class="page-list">
          <li><a href="welcome.html">Welcome Page</a></li>
          <li><a href="tooth-extraction-video-system.html">Tooth Extraction Video System</a></li>
          <li><a href="examen-completo.html">Examen Completo</a></li>
          <li><a href="poe-prophy.html">POE Prophy</a></li>
          <li><a href="srp.html">SRP</a></li>
        </ul>
      </section>
        <a class="home-link" href="./index.html">Back to home</a>
      </article>
    </main>
  </body>
</html>
